name: ironshape
region: nyc

services:
  - name: web
    github:
      repo: oliveiragoncalvesmatheus5-spec/IRONSHAPE
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build
    run_command: npm start
    environment_slug: node-js
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    http_port: 3000
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: IRON_COACH_MODEL
        value: claude-haiku-4-5
        scope: RUN_TIME
      - key: WORKOUTX_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: WORKOUTX_BASE_URL
        value: https://api.workoutxapp.com/v1
        scope: RUN_TIME
      - key: VITE_SUPABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: VITE_SUPABASE_ANON_KEY
        scope: BUILD_TIME
        type: SECRET
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ABACATEPAY_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ABACATEPAY_PRODUCT_PRO_ID
        scope: RUN_TIME
        type: SECRET
      - key: ABACATEPAY_PRODUCT_ELITE_ID
        scope: RUN_TIME
        type: SECRET
      - key: ABACATEPAY_WEBHOOK_SIGNATURE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: VITE_GA_MEASUREMENT_ID
        value: G-JTYEDMRSQR
        scope: RUN_AND_BUILD_TIME
      - key: GA_API_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: APP_URL
        value: https://ironshape.online
        scope: RUN_TIME
      - key: IRONSHOP_ENABLED
        value: "false"
        scope: RUN_TIME
      - key: IRONSHOP_AVAILABILITY_MODE
        value: admins
        scope: RUN_TIME
      - key: IRONSHOP_GRADUAL_PERCENTAGE
        value: "0"
        scope: RUN_TIME
      - key: IRONSHOP_ALLOWED_GROUP
        value: ""
        scope: RUN_TIME
      - key: IRONSHOP_EARLY_ACCESS_EMAILS
        value: ""
        scope: RUN_TIME
