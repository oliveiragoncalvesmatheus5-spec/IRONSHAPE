<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0B0B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="IRON SAAS — A evolução definitiva do seu treino." />
    <title>IRON SAAS</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #0B0B0B; }
      #root { min-height: 100%; }
      #app-loading {
        position: fixed; inset: 0;
        background: #0B0B0B;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #app-loading.hidden { opacity: 0; pointer-events: none; }
      #app-loading .ring {
        width: 48px; height: 48px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: #FF6A00;
        border-right-color: #FF6A00;
        animation: spin 0.8s linear infinite;
      }
      #app-loading p {
        color: #6F6F6F;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        letter-spacing: 0.05em;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app-loading">
      <div class="ring"></div>
      <p>Iniciando sua jornada...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove the native loading screen once React mounts
      window.__removeAppLoading = function() {
        var el = document.getElementById('app-loading');
        if (el) {
          el.classList.add('hidden');
          setTimeout(function() { el.remove(); }, 500);
        }
      };
    </script>
  </body>
</html>
