name: ironshape
region: nyc

services:
  - name: web
    github:
      repo: IronSaaS/ironsaas
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build
    run_command: npm start
    environment_slug: node-js
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    http_port: 3000
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: RAPIDAPI_KEY
        scope: RUN_TIME
        type: SECRET
      - key: VITE_SUPABASE_URL
        scope: BUILD_TIME
        type: SECRET
      - key: VITE_SUPABASE_ANON_KEY
        scope: BUILD_TIME
        type: SECRET
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: APP_URL
        value: https://ironshape.online
        scope: RUN_TIME
