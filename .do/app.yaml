name: ironshape
region: nyc

services:
  - name: web
    github:
      repo: oliveiragoncalvesmatheus5-spec/IRONSHAPE
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build
    run_command: npm start
    environment_slug: node-js
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    http_port: 3000
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: OPENAI_MODEL
        value: gpt-5.5
        scope: RUN_TIME
      - key: WORKOUTX_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: RAPIDAPI_KEY
        scope: RUN_TIME
        type: SECRET
      - key: RAPIDAPI_HOST
        value: edb-with-videos-and-images-by-ascendapi.p.rapidapi.com
        scope: RUN_TIME
      - key: VITE_SUPABASE_URL
        scope: BUILD_TIME
        type: SECRET
      - key: VITE_SUPABASE_ANON_KEY
        scope: BUILD_TIME
        type: SECRET
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ABACATEPAY_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ABACATEPAY_PRODUCT_PRO_ID
        scope: RUN_TIME
        type: SECRET
      - key: ABACATEPAY_PRODUCT_ELITE_ID
        scope: RUN_TIME
        type: SECRET
      - key: ABACATEPAY_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ABACATEPAY_WEBHOOK_SIGNATURE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: APP_URL
        value: https://ironshape.online
        scope: RUN_TIME
